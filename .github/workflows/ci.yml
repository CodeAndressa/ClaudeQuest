name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: claudequest
          POSTGRES_PASSWORD: claudequest
          POSTGRES_DB: claudequest_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U claudequest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://claudequest:claudequest@localhost:5432/claudequest_test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy app

      - name: Bandit
        run: uv run bandit -r app -q --exclude '*/tests/*,*/test_*'

      - name: Pytest (coverage >= 90%)
        run: uv run pytest --cov

  frontend:
    name: Frontend — lint, types, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Unit tests (coverage >= 90%)
        run: npm run test:coverage

      - name: Build
        run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: claudequest
          POSTGRES_PASSWORD: claudequest
          POSTGRES_DB: claudequest
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U claudequest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --all-groups

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claudequest:claudequest@localhost:5432/claudequest
        run: |
          uv run alembic upgrade head
          uv run python scripts/seed_demo_data.py
          uv run uvicorn app.main:app --port 8002 &
          npx --yes wait-on http://localhost:8002/api/v1/live

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        run: npm run test:e2e
