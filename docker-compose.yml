services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claudequest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claudequest}
      POSTGRES_DB: ${POSTGRES_DB:-claudequest}
    ports:
      - "5432:5432"
    volumes:
      - claudequest_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claudequest}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-claudequest}:${POSTGRES_PASSWORD:-claudequest}@db:5432/${POSTGRES_DB:-claudequest}
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy

volumes:
  claudequest_postgres_data:
